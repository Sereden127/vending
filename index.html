<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk - V2</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --muted:#aab0be;
      --green:#1db954;
      --input:#222634;
      --border:#2a2f3a;
    }

    body{ font-family: Arial; margin:0; padding:16px; background:var(--bg); color:var(--text); }
    .container{ max-width:420px; margin:auto; }
    .box{ background:var(--card); padding:14px; margin-bottom:12px; border-radius:14px; }

    label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }

    input{
      width:100%; padding:12px; border-radius:10px;
      border:1px solid var(--border);
      background:var(--input); color:var(--text);
      box-sizing:border-box;
    }

    button{
      width:100%; padding:16px;
      border:none; border-radius:14px;
      background:var(--green); color:white;
      font-size:18px;
    }

    .selected{ outline:2px solid white; }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk (V2 CLEAN)</h2>

  <div class="box">
    <button onclick="setMachine(1)" id="b1">☕ Café 1</button>
    <button onclick="setMachine(2)" id="b2">☕ Café 2</button>
  </div>

  <div class="box">
    <label>Order ID</label>
    <input id="orderId" />
  </div>

  <div class="box">
    <label>Selección</label>
    <input id="sel" />
  </div>

  <div class="box">
    <label>Email</label>
    <input id="email" />
  </div>

  <button onclick="go()">PEDIR</button>

</div>

<script>

// ================= BASE DATA (plantilla limpia) =================
const baseTemplate = {
  Ds_Order: "",
  Ds_Amount: 100,
  Ds_Currency: "978"
};

let machine = 1;

function buildPayload(){

  const orderId = document.getElementById("orderId").value;
  const sel = document.getElementById("sel").value;
  const email = document.getElementById("email").value;

  const merchant = structuredClone(baseTemplate);

  merchant.Ds_Order = orderId;

  const datos = {
    seleccion: sel,
    userEmail: email,
    machine: machine
  };

  const url = new URL("https://fersomaticweb.onrender.com/pago-ok-seleccion");

  url.searchParams.set("Ds_MerchantParameters", btoa(JSON.stringify(merchant)));
  url.searchParams.set("datos", btoa(JSON.stringify(datos)));

  return url;
}

function setMachine(n){
  machine = n;
  document.getElementById("b1").classList.remove("selected");
  document.getElementById("b2").classList.remove("selected");
  document.getElementById("b"+n).classList.add("selected");
}

function go(){

  if (!document.getElementById("orderId").value) {
    alert("Order ID obligatorio");
    return;
  }

  window.location.href = buildPayload().toString();
}

setMachine(1);

</script>

</body>
</html>
