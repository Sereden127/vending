<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --input:#222634;
      --border:#2a2f3a;
      --green:#1db954;
    }

    body{
      margin:0;
      padding:16px;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      background:var(--green);
      color:white;
      margin-top:6px;
    }

    .selected{
      outline:2px solid white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="cafe1Btn" onclick="setCafe(1)">☕ Máquina Café 1</button>
    <button id="cafe2Btn" onclick="setCafe(2)">☕ Máquina Café 2</button>
  </div>

  <div class="box">
    <input id="seleccion" type="text" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <div class="box" id="sugarBox" style="display:none;">
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
  </div>

  <div class="box">
    <label>Ds_Order</label>
    <input id="orderView" type="text" readonly />
  </div>

  <button id="sendBtn" onclick="go()">PEDIR</button>

</div>

  orderCounter++;

    .reduce((a,b)=>a + b.toString(16).padStart(2,'0'), '');

}

  document.getElementById('sugarBox').style.display = (val.length === 4) ? 'block' : 'none';
});
