<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de enlaces (PWA)</title>

  <style>
    body { font-family: Arial; padding: 15px; background:#f5f5f5; }
    input { width:100%; padding:8px; margin:6px 0; }
    button { width:100%; padding:10px; margin-top:8px; }
    .box { background:#fff; padding:10px; margin-top:10px; border-radius:8px; }
    label { font-size:12px; color:#555; }
  </style>
</head>
<body>

<h2>📱 Editor de enlaces</h2>

<div id="form"></div>

<button onclick="generate()">Generar enlace</button>
<button onclick="copyLink()">📋 Copiar enlace</button>

<textarea id="output" readonly style="width:100%;margin-top:10px;"></textarea>

<script>

// 🔥 ENLACE BASE FIJO
const fixedUrl = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSODEwNDcwNjUxIiwiaW1wb3J0ZUNlbnRzIjoiNTAiLCJzZWxlY2Npb24iOiI3NzciLCJtYWNoaW5lSWQiOiIxODk4MiIsInRpcG8iOiJzZWxlY2Npb24iLCJ6b25hIjoiY2FmZWNhcCIsInVzZXJFbWFpbCI6IiIsInN1Z2FyTGV2ZWwiOiIxIiwiY2xpZW50SWQiOiJQaWNhMjRoIiwicHJvZHVjdE5hbWUiOiJTRUxFQ0NJTyA3NzcifQ==&Ds_Signature=PFkbR12TKG9pn_ZUA4gfm68qlUueINknfG8f_SZRGPY=&Ds_SignatureVersion=HMAC_SHA256_V1";

let datos = {};
let merchant = {};
let signature = "";
let baseUrl = "https://fersomaticweb.onrender.com/pago-ok-seleccion";

function b64decode(str){
  try { return JSON.parse(atob(str)); } catch(e){ return {}; }
}

function b64encode(obj){
  return btoa(JSON.stringify(obj));
}

function decode(){
  const u = new URL(fixedUrl);

  datos = b64decode(u.searchParams.get("datos"));
  merchant = b64decode(u.searchParams.get("Ds_MerchantParameters"));
  signature = u.searchParams.get("Ds_Signature");

  render();
}

function render(){
  document.getElementById('form').innerHTML = `
    <div class='box'>
      <h3>🛒 Producto</h3>
      <input id='productName' value='${datos.productName||""}' />
      <input id='seleccion' value='${datos.seleccion||""}' />
    </div>

    <div class='box'>
      <h3>👤 Usuario</h3>
      <input id='clientId' value='${datos.clientId||""}' />
      <input id='userEmail' value='${datos.userEmail||""}' />
    </div>

    <div class='box'>
      <h3>📦 Pedido</h3>
      <input id='numeroPedido' value='${datos.numeroPedido||merchant.Ds_Order||""}' />
    </div>
  `;
}

function generate(){
  datos.productName = document.getElementById('productName').value;
  datos.seleccion = document.getElementById('seleccion').value;
  datos.clientId = document.getElementById('clientId').value;
  datos.userEmail = document.getElementById('userEmail').value;
  merchant.Ds_Order = document.getElementById('numeroPedido').value;

  const url = baseUrl
    + "?datos=" + b64encode(datos)
    + "&Ds_MerchantParameters=" + b64encode(merchant)
    + "&Ds_Signature=" + signature
    + "&Ds_SignatureVersion=HMAC_SHA256_V1";

  document.getElementById('output').value = url;
}

function copyLink(){
  navigator.clipboard.writeText(document.getElementById('output').value);
  alert("Copiado");
}

window.onload = decode;

</script>

</body>
</html>
