<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --input:#222634;
      --border:#2a2f3a;
      --green:#1db954;
    }

    body{
      margin:0;
      padding:16px;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      background:var(--green);
      color:white;
      margin-top:6px;
    }

    .selected{
      outline:2px solid white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="cafe1Btn" onclick="setCafe(1)">☕ Máquina Café 1</button>
    <button id="cafe2Btn" onclick="setCafe(2)">☕ Máquina Café 2</button>
  </div>

  <div class="box">
    <input id="seleccion" type="text" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <div class="box" id="sugarBox" style="display:none;">
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
  </div>

  <div class="box">
    <label>Ds_Order</label>
    <input id="orderView" type="text" readonly />
  </div>

  <button id="sendBtn" onclick="go()">PEDIR</button>

</div>

<script>

// ================= BASES =================

const snackBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSNDMzNjgzMjk0IiwiaW1wb3J0ZUNlbnRzIjoiMTAwIiwic2VsZWNjaW9uIjoiMTE3IiwibWFjaGluZU5hbWUiOiJWOCBPWlRVUksgUVVFQkFCQSIsIm1hY2hpbmVJZCI6IjE4OTgzIiwidGlwbyI6InNlbGVjY2lvbiIsInpvbmEiOiJzbmFja3NlbGVjY2lvbiIsInVzZXJFbWFpbCI6IiIsImNsaWVudElkIjoiUGljYTI0aCIsInByb2R1Y3ROYW1lIjoiU0VMRUNDSU9OIDExNyJ9&Ds_SignatureVersion=HMAC_SHA256_V1&Ds_Signature=s1g8KcApEXkXb8TD_cKqw11NQJtnpUkhbkggV317qh0=";

const cafeBase = "...";
const cafeBase2 = "...";

let cafeMachine = 1;
let isProcessing = false;
let orderCounter = 0;

// ================= ORDER =================

function generateDsOrder(machineId){
  orderCounter++;

  const time = Date.now().toString(36).toUpperCase();
  const counter = orderCounter.toString(36).toUpperCase();

  const rand = crypto.getRandomValues(new Uint8Array(2))
    .reduce((a,b)=> a + b.toString(16).padStart(2,'0'), '');

  return `FER-${machineId}-${time}-${counter}-${rand}`.toUpperCase();
}

// ================= ENCODING =================

function encodeSafe(obj){
  return btoa(JSON.stringify(obj));
}

// ================= UI =================

function setCafe(n){
  cafeMachine = n;

  document.getElementById('cafe1Btn').classList.remove('selected');
  document.getElementById('cafe2Btn').classList.remove('selected');
  document.getElementById('cafe' + n + 'Btn').classList.add('selected');
}

document.getElementById('seleccion').addEventListener('input', () => {
  const val = document.getElementById('seleccion').value;
  document.getElementById('sugarBox').style.display = (val.length === 4) ? 'block' : 'none';
});

// ================= MAIN FIXED =================

async function go(){

  try {

    if (isProcessing) return;
    isProcessing = true;

    const btn = document.getElementById("sendBtn");
    btn.innerText = "PROCESANDO...";

    const sel = document.getElementById('seleccion').value;
    const email = document.getElementById('userEmail').value;
    const sugar = document.getElementById('sugarLevel')?.value || 0;

    const base = (sel.length === 4)
      ? (cafeMachine === 1 ? cafeBase : cafeBase2)
      : snackBase;

    const url = new URL(base);

    // ================= SAFE PARSE =================
    let datos = {};
    let merchant = {};

    const datosB64 = url.searchParams.get("datos");
    const merchantB64 = url.searchParams.get("Ds_MerchantParameters");

    if (datosB64 && datosB64 !== "...") {
      try {
        datos = JSON.parse(atob(datosB64));
      } catch (e) {
        console.warn("Datos corruptos");
      }
    }

    if (merchantB64 && merchantB64 !== "...") {
      try {
        merchant = JSON.parse(atob(merchantB64));
      } catch (e) {
        console.warn("Merchant corrupto");
      }
    }

    // ================= ORDER =================
    const fakeOrder = generateDsOrder(cafeMachine);
    document.getElementById("orderView").value = fakeOrder;

    // ================= UPDATE =================
    datos.seleccion = sel;
    datos.userEmail = email;
    datos.sugarLevel = sugar;
    datos.numeroPedido = fakeOrder;

    merchant.Ds_Order = fakeOrder;

    const merchantEncoded = encodeSafe(merchant);
    const datosEncoded = encodeSafe(datos);

    // ================= SIGN =================
    const secretKey = "TU_CLAVE_SECRETA";

    const signature = await signHmacSHA256(secretKey, merchantEncoded);

    url.searchParams.set("datos", datosEncoded);
    url.searchParams.set("Ds_MerchantParameters", merchantEncoded);
    url.searchParams.set("Ds_Signature", signature);
    url.searchParams.set("Ds_SignatureVersion", "HMAC_SHA256_V1");

    window.location.href = url.toString();

  } catch (err) {
    console.error("ERROR GO:", err);
    alert("Error generando pedido");
    isProcessing = false;
    document.getElementById("sendBtn").innerText = "PEDIR";
  }
}

// ================= HMAC =================

async function signHmacSHA256(secret, data) {
  const enc = new TextEncoder();

  const key = await crypto.subtle.importKey(
    "raw",
    enc.encode(secret),
    { name: "HMAC", hash: "SHA-256" },
    false,
    ["sign"]
  );

  const signature = await crypto.subtle.sign(
    "HMAC",
    key,
    enc.encode(data)
  );

  const bytes = new Uint8Array(signature);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));

  return btoa(binary)
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

</script>

</body>
</html>
