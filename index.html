<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --input:#222634;
      --border:#2a2f3a;
      --green:#1db954;
    }

    body{
      margin:0;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
      padding:16px;
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      border-radius:14px;
      margin-bottom:12px;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:var(--green);
      color:white;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <input id="seleccion" type="text" placeholder="Ej: 777 o 1003"/>
  </div>

  <div class="box">
    <input id="userEmail" type="text" placeholder="Email (opcional)"/>
  </div>

  <button onclick="go()">PAGAR</button>

</div>

<script>

const backendURL = "https://vending-backend-sjq8.onrender.com";

async function go(){

  const seleccion = document.getElementById("seleccion").value;
  const email = document.getElementById("userEmail").value;

  if (!seleccion) {
    alert("Introduce selección");
    return;
  }

  try {

    // 🔥 CREAR PEDIDO REAL
    const res = await fetch(`${backendURL}/create-order`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount: seleccion.length === 4 ? 50 : 100,
        seleccion,
        email: email || ""
      })
    });

    if (!res.ok) {
      throw new Error("Error backend " + res.status);
    }

    const data = await res.json();

    console.log("ORDER:", data);

    if (!data.paymentUrl) {
      throw new Error("No paymentUrl recibido");
    }

    // 🔥 REDIRECCIÓN A TPV (O SIMULACIÓN)
    window.location.href = data.paymentUrl;

  } catch (err) {
    console.error(err);
    alert("Error conectando con backend");
  }
}

</script>

</body>
</html>
