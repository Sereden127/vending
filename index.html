<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --input:#222634;
      --border:#2a2f3a;
      --green:#1db954;
    }

    body{
      margin:0;
      padding:16px;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      background:var(--green);
      color:white;
      margin-top:6px;
    }

    .selected{
      outline:2px solid white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="cafe1Btn" onclick="setCafe(1)">☕ Máquina Café 1</button>
    <button id="cafe2Btn" onclick="setCafe(2)">☕ Máquina Café 2</button>
  </div>

  <div class="box">
    <input id="seleccion" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <!-- AZÚCAR RESTAURADO -->
  <div class="box" id="sugarBox" style="display:none;">
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
  </div>

  <div class="box">
    <label>Ds_Order</label>
    <input id="orderView" readonly />
  </div>

  <button onclick="go()">PEDIR</button>

</div>

<script>

// ================= BASES =================
const snackBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=REPLACE";
const cafeBase  = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=REPLACE";
const cafeBase2 = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=REPLACE";

// ================= STATE =================
let cafeMachine = 1;
let isProcessing = false;

// ================= UI =================
function setCafe(n){
  cafeMachine = n;

  document.getElementById('cafe1Btn').classList.remove('selected');
  document.getElementById('cafe2Btn').classList.remove('selected');
  document.getElementById('cafe' + n + 'Btn').classList.add('selected');
}

document.getElementById('seleccion').addEventListener('input', () => {
  const val = document.getElementById('seleccion').value;
  document.getElementById('sugarBox').style.display = (val.length === 4) ? 'block' : 'none';
});

// ================= SAFE HELPERS =================
function safeDecode(b64){
  try {
    if (!b64 || b64 === "...") return {};
    return JSON.parse(atob(b64));
  } catch {
    return {};
  }
}

function safeEncode(obj){
  try {
    return btoa(JSON.stringify(obj));
  } catch {
    return "";
  }
}

// ================= MAIN (RESTORED + FIXED) =================
async function go(){

  if (isProcessing) return;
  isProcessing = true;

  document.getElementById("sendBtn").innerText = "PROCESANDO...";

  const sel = document.getElementById('seleccion').value || "";
  const email = document.getElementById('userEmail').value || "";
  const sugar = document.getElementById('sugarLevel')?.value || 0;

  const base = (sel.length === 4)
    ? (cafeMachine === 1 ? cafeBase : cafeBase2)
    : snackBase;

  const url = new URL(base);

  let datos = safeDecode(url.searchParams.get("datos"));
  let merchant = safeDecode(url.searchParams.get("Ds_MerchantParameters"));

  // 🔥 AQUÍ NO GENERAMOS NADA NUEVO
  const order = merchant.Ds_Order || "";

  document.getElementById("orderView").value = order;

  datos.seleccion = sel;
  datos.userEmail = email;
  datos.sugarLevel = sugar;

  merchant.Ds_Order = order;

  const merchantEncoded = safeEncode(merchant);
  const datosEncoded = safeEncode(datos);

  const secretKey = "TU_CLAVE_SECRETA";

  const signature = await signHmacSHA256(secretKey, merchantEncoded);

  url.searchParams.set("datos", datosEncoded);
  url.searchParams.set("Ds_MerchantParameters", merchantEncoded);
  url.searchParams.set("Ds_Signature", signature);
  url.searchParams.set("Ds_SignatureVersion", "HMAC_SHA256_V1");

  window.location.href = url.toString();
}

// ================= HMAC =================
async function signHmacSHA256(secret, data) {

  const enc = new TextEncoder();

  const key = await crypto.subtle.importKey(
    "raw",
    enc.encode(secret),
    { name: "HMAC", hash: "SHA-256" },
    false,
    ["sign"]
  );

  const sig = await crypto.subtle.sign("HMAC", key, enc.encode(data));

  const bytes = new Uint8Array(sig);
  let binary = "";
  bytes.forEach(b => binary += String.fromCharCode(b));

  return btoa(binary)
    .replace(/\+/g,'-')
    .replace(/\//g,'_')
    .replace(/=+$/,'');
}

</script>

</body>
</html>
