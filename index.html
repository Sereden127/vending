<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    body{
      margin:0;
      padding:16px;
      font-family:Arial;
      background:#0f1115;
      color:#e8eaf0;
    }

    .box{
      background:#171a21;
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
      max-width:420px;
      margin-left:auto;
      margin-right:auto;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid #2a2f3a;
      background:#222634;
      color:white;
      font-size:16px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      background:#1db954;
      color:white;
      cursor:pointer;
    }

    #sugarBox{ display:none; }
  </style>
</head>

<body>

<div class="box">
  <h2>Vending Ozturk</h2>

  <button onclick="setMachine(1)">Máquina 1</button>
  <button onclick="setMachine(2)">Máquina 2</button>
</div>

<div class="box">
  <input id="selection" placeholder="Producto (3 o 4 dígitos)" />
</div>

<div class="box">
  <input id="email" placeholder="Email" />
</div>

<div class="box" id="sugarBox">
  <input id="sugar" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
</div>

<div class="box">
  <button onclick="go()">PEDIR</button>
</div>

<script>

// ================= ENLACES ORIGINALES =================
const links = {
  1: "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=LINK_M1",
  2: "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=LINK_M2"
};

let machine = 1;

// ================= UI =================
function setMachine(n){
  machine = n;
}

document.getElementById("selection").addEventListener("input", (e) => {
  document.getElementById("sugarBox").style.display =
    e.target.value.length === 4 ? "block" : "none";
});

// ================= MAIN =================
function go(){

  const sel = document.getElementById("selection").value || "";
  const email = document.getElementById("email").value || "";
  const sugar = document.getElementById("sugar").value || "";

  let url = links[machine];

  // 🔥 SOLO AÑADIMOS PARÁMETROS EXTERNOS (SIN TOCAR datos)
  const finalUrl = new URL(url);

  finalUrl.searchParams.set("seleccion", sel);
  finalUrl.searchParams.set("userEmail", email);

  if (sel.length === 4) {
    finalUrl.searchParams.set("sugarLevel", sugar);
  }

  window.location.href = finalUrl.toString();
}

</script>

</body>
</html>
