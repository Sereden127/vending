<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --muted:#aab0be;
      --green:#1db954;
      --input:#222634;
      --border:#2a2f3a;
      --error:#ff4d4d;
    }

    body{
      font-family: Arial, sans-serif;
      padding:16px;
      background:var(--bg);
      color:var(--text);
      margin:0;
    }

    .container{
      max-width:420px;
      margin:0 auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--border);
      font-size:16px;
      background:var(--input);
      color:var(--text);
      box-sizing:border-box;
    }

    input::placeholder{
      color:var(--muted);
      opacity:1;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
      background:var(--green);
      color:white;
      margin-bottom:6px;
    }

    .selected{
      outline:2px solid white;
    }

    .error{
      color:var(--error);
      font-size:12px;
      margin-top:6px;
      display:none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="btnCafe1" onclick="setMachine(1)">☕ Café 1</button>
    <button id="btnCafe2" onclick="setMachine(2)">☕ Café 2</button>
  </div>

  <!-- ORDER ID -->
  <div class="box">
    <label>Order ID</label>
    <input id="orderId" type="text" placeholder="ID Order (editable)" />
    <div id="orderError" class="error">El Order ID no puede estar vacío</div>
  </div>

  <!-- SELECCIÓN -->
  <div class="box">
    <label>Selección</label>
    <input id="seleccion" type="text" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <!-- EMAIL -->
  <div class="box">
    <label>Email</label>
    <input id="userEmail" placeholder="Email" />
  </div>

  <!-- AZÚCAR -->
  <div class="box" id="sugarBox" style="display:none;">
    <label>Azúcar</label>
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="0-3" />
  </div>

  <button onclick="go()">PEDIR</button>

</div>

<script>

// ================= BASES =================

const cafeBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSODYxNzEyNTM5IiwiaW1wb3J0ZUNlbnRzIjoiNTAiLCJzZWxlY2Npb24iOiIxMDAzIiwibWFjaGluZU5hbWUiOiJHLTU0NiBDQVAgMSBPWlRVUksgUVVFQkFCQSIsIm1hY2hpbmVJZCI6IjE4OTgyIiwidGlwbyI6InNlbGVjY2lvbiIsInpvbmEiOiJjYWZlY2FwIiwidXNlckVtYWlsIjoiIiwic3VnYXJMZXZlbCI6IjAiLCJjbGllbnRJZCI6IlBpY2EyNGgiLCJwcm9kdWN0TmFtZSI6IkNBRkUgQ09OIExFQ0hFIENBUCJ9&Ds_SignatureVersion=HMAC_SHA256_V1&Ds_MerchantParameters=eyJEc19EYXRlIjoiMzAlMkYwMyUyRjIwMjYiLCJEc19Ib3VyIjoiMTElM0EwOCIsIkRzX1NlY3VyZVBheW1lbnQiOiIxIiwiRHNfQW1vdW50IjoiNTAiLCJEc19DdXJyZW5jeSI6Ijk3OCIsIkRzX09yZGVyIjoiRkVSODYxNzEyNTM5IiwiRHNfTWVyY2hhbnRDb2RlIjoiMzY3NDQ1MDc5IiwiRHNfVGVybWluYWwiOiIwMDEiLCJEc19SZXNwb25zZSI6IjAwMDAiLCJEc19UcmFuc2FjdGlvblR5cGUiOiIwIiwiRHNfTWVyY2hhbnREYXRhIjoiIiwiRHNfQXV0aG9yaXNhdGlvbkNvZGUiOiI3MjY0MTMiLCJEc19Db25zdW1lckxhbmd1YWdlIjoiMSIsIkRzX0NhcmRfQ291bnRyeSI6IjcyNCIsIkRzX0NhcmRfVHlwb2xvZ3kiOiJDT05TVU1PIiwiRHNfQ2FyZF9UeXBlIjoiRCIsIkRzX0NhcmRfQnJhbmQiOiIyIiwiRHNfUHJvY2Vzc2VkUGF5TWV0aG9kIjoiNzEifQ==&Ds_Signature=NnZFRxpyHH-_CrYTKdlFXLs5clQ25Qwt4PJy56fs_bI=";

// ================= STATE =================
let machine = 1;

// ================= ORDER =================
function updateOrder(){

  const input = document.getElementById("orderId");

  if (input.value.trim() !== "") return;

  try {
    const base = machine === 1 ? cafeBase : snackBase;
    const url = new URL(base);

    const param = url.searchParams.get("Ds_MerchantParameters");
    if (!param) return;

    const merchant = JSON.parse(atob(param));

    input.value = merchant?.Ds_Order || "";

  } catch (e) {
    console.error(e);
  }
}

// ================= UI =================
function setMachine(n){

  machine = n;

  document.getElementById("btnCafe1").classList.remove("selected");
  document.getElementById("btnCafe2").classList.remove("selected");

  document.getElementById("btnCafe"+n).classList.add("selected");

  updateOrder();
}

// azúcar solo para 4 dígitos
document.getElementById("seleccion").addEventListener("input", (e) => {
  document.getElementById("sugarBox").style.display =
    e.target.value.length === 4 ? "block" : "none";
});

// ================= MAIN =================
function go(){

  const sel = document.getElementById("seleccion").value;
  const email = document.getElementById("userEmail").value;
  const orderId = document.getElementById("orderId").value;

  const errorBox = document.getElementById("orderError");

  // 🔒 VALIDACIÓN
  if (!orderId || orderId.trim() === "") {
    errorBox.style.display = "block";
    return;
  } else {
    errorBox.style.display = "none";
  }

  const base = sel.length === 4 ? cafeBase : snackBase;

  const url = new URL(base);

  const datos = JSON.parse(atob(url.searchParams.get("datos")));
  const merchant = JSON.parse(atob(url.searchParams.get("Ds_MerchantParameters")));

  // 🔥 INYECCIÓN REAL DEL ORDER ID
  merchant.Ds_Order = orderId;

  datos.seleccion = sel;
  datos.productName = "SELECCION " + sel;
  datos.userEmail = email;

  url.searchParams.set("datos", btoa(JSON.stringify(datos)));
  url.searchParams.set("Ds_MerchantParameters", btoa(JSON.stringify(merchant)));

  window.location.href = url.toString();
}

// ================= INIT =================
updateOrder();
document.getElementById("btnCafe1").classList.add("selected");

</script>

</body>
</html>
