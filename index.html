<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk - V1</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --muted:#aab0be;
      --green:#1db954;
      --input:#222634;
      --border:#2a2f3a;
    }

    body{
      font-family: Arial, sans-serif;
      padding:16px;
      background:var(--bg);
      color:var(--text);
      margin:0;
    }

    .container{ max-width:420px; margin:0 auto; }
    .box{ background:var(--card); padding:14px; margin-bottom:12px; border-radius:14px; }

    label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--border);
      font-size:16px;
      background:var(--input);
      color:var(--text);
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
      background:var(--green);
      color:white;
    }

    .selected{ outline:2px solid white; }
    .error{ color:#ff4d4d; font-size:12px; display:none; }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk (V1 FIX)</h2>

  <div class="box">
    <button id="btnCafe1" onclick="setMachine(1)">☕ Café 1</button>
    <button id="btnCafe2" onclick="setMachine(2)">☕ Café 2</button>
  </div>

  <div class="box">
    <label>Order ID</label>
    <input id="orderId" type="text" placeholder="ID Order" />
  </div>

  <div class="box">
    <label>Selección</label>
    <input id="seleccion" type="text" />
  </div>

  <div class="box">
    <label>Email</label>
    <input id="userEmail" />
  </div>

  <button onclick="go()">PEDIR</button>

</div>

<script>

const snackBase = "SNACK_BASE_AQUI";
const cafeBase = "CAFE_BASE_AQUI";

let machine = 1;

function updateOrder(){
  const input = document.getElementById("orderId");
  if (input.value.trim()) return;

  const base = machine === 1 ? cafeBase : snackBase;
  const url = new URL(base);

  const raw = url.searchParams.get("Ds_MerchantParameters");
  if (!raw) return;

  const merchant = JSON.parse(atob(raw));
  input.value = merchant.Ds_Order || "";
}

function setMachine(n){
  machine = n;
  document.getElementById("btnCafe1").classList.remove("selected");
  document.getElementById("btnCafe2").classList.remove("selected");
  document.getElementById("btnCafe"+n).classList.add("selected");
  updateOrder();
}

function go(){

  const orderId = document.getElementById("orderId").value;
  const sel = document.getElementById("seleccion").value;
  const email = document.getElementById("userEmail").value;

  const base = sel.length === 4 ? cafeBase : snackBase;
  const url = new URL(base);

  const datos = JSON.parse(atob(url.searchParams.get("datos")));
  const raw = url.searchParams.get("Ds_MerchantParameters");

  const merchant = JSON.parse(atob(raw));

  // ✔ FIX REAL
  merchant.Ds_Order = orderId;

  url.searchParams.set("Ds_MerchantParameters", btoa(JSON.stringify(merchant)));

  datos.seleccion = sel;
  datos.userEmail = email;

  url.searchParams.set("datos", btoa(JSON.stringify(datos)));

  window.location.href = url.toString();
}

updateOrder();
document.getElementById("btnCafe1").classList.add("selected");

</script>

</body>
</html>
