<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --muted:#aab0be;
      --green:#1db954;
      --input:#222634;
      --border:#2a2f3a;
    }

    body{
      font-family: Arial, sans-serif;
      padding:16px;
      background:var(--bg);
      color:var(--text);
      margin:0;
    }

    .container{
      max-width:420px;
      margin:0 auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      font-size:16px;
      background:var(--input);
      color:var(--text);
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
      background:var(--green);
      color:white;
      margin-top:6px;
      transition:0.2s;
    }

    .selected{
      outline:2px solid white;
      transform:scale(0.97);
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📱 Vending Ozturk</h2>

  <!-- SELECCIÓN MÁQUINA CAFÉ -->
  <div class="box">
    <div style="display:flex; gap:10px;">
      <button id="cafe1Btn" onclick="setCafe(1)">☕ Máquina 1</button>
      <button id="cafe2Btn" onclick="setCafe(2)">☕ Máquina 2</button>
    </div>
  </div>

  <!-- PRODUCTO -->
  <div class="box">
    <input id="seleccion" type="text" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <!-- EMAIL -->
  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <!-- AZÚCAR -->
  <div class="box" id="sugarBox" style="display:none;">
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
  </div>

  <button onclick="go()">PEDIR</button>
</div>

<script>

// ===== BASES =====
const snackBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSNDMzNjgzMjk0IiwiaW1wb3J0ZUNlbnRzIjoiMTAwIiwic2VsZWNjaW9uIjoiMTE3IiwibWFjaGluZU5hbWUiOiJWOCBPWlRVUksgUVVFQkFCQSIsIm1hY2hpbmVJZCI6IjE4OTgzIiwidGlwbyI6InNlbGVjY2lvbiIsInpvbmEiOiJzbmFja3NlbGVjY2lvbiIsInVzZXJFbWFpbCI6IiIsImNsaWVudElkIjoiUGljYTI0aCIsInByb2R1Y3ROYW1lIjoiU0VMRUNDSU9OIDExNyJ9&Ds_SignatureVersion=HMAC_SHA256_V1&Ds_MerchantParameters=...";

const cafeBase = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSODYxNzEyNTM5IiwiaW1wb3J0ZUNlbnRzIjoiNTAiLCJzZWxlY2Npb24iOiIxMDAzIiwibWFjaGluZU5hbWUiOiJHLTU0NiBDQVAgMSBPWlRVUksgUVVFQkFCQSIsIm1hY2hpbmVJZCI6IjE4OTgyIiwidGlwbyI6InNlbGVjY2lvbiIsInpvbmEiOiJjYWZlY2FwIiwidXNlckVtYWlsIjoiIiwic3VnYXJMZXZlbCI6IjAiLCJjbGllbnRJZCI6IlBpY2EyNGgiLCJwcm9kdWN0TmFtZSI6IkNBRkUgQ09OIExFQ0hFIENBUCJ9&Ds_SignatureVersion=HMAC_SHA256_V1&Ds_MerchantParameters=...";

// 👇 NUEVA MÁQUINA CAFÉ 2
const cafeBase2 = "https://fersomaticweb.onrender.com/pago-ok-seleccion?datos=eyJjbGF2ZUJhc2U2NCI6Ikx3OVBQbTNBa3dYUEkwYWVhYnJQbHpaS1M1MXRTZElaIiwiZnVjIjoiMzY3NDQ1MDc5IiwibnVtZXJvUGVkaWRvIjoiRkVSOTA0NDU0NTgxIiwiaW1wb3J0ZUNlbnRzIjoiNTAiLCJzZWxlY2Npb24iOiIxMDAzIiwibWFjaGluZU5hbWUiOiJHLTU0NiBDQVAgMiBPWlRVUksgUVVFQkFCQSIsIm1hY2hpbmVJZCI6IjE4OTg0IiwidGlwbyI6InNlbGVjY2lvbiIsInpvbmEiOiJjYWZlY2FwIiwidXNlckVtYWlsIjoiIiwic3VnYXJMZXZlbCI6IjAiLCJjbGllbnRJZCI6IlBpY2EyNGgiLCJwcm9kdWN0TmFtZSI6IkNBRkUgQ09OIExFQ0hFIENBUCJ9&Ds_SignatureVersion=HMAC_SHA256_V1&Ds_MerchantParameters=...";

function decode(b64){return JSON.parse(atob(b64));}
function encode(obj){return btoa(JSON.stringify(obj));}

// ===== ESTADO =====
let cafeMachine = 1;

function setCafe(n){
  cafeMachine = n;

  document.getElementById('cafe1Btn').classList.remove('selected');
  document.getElementById('cafe2Btn').classList.remove('selected');

  document.getElementById('cafe' + n + 'Btn').classList.add('selected');
}

// ===== AZÚCAR SOLO CAFÉ =====
const selInput = document.getElementById('seleccion');
const sugarBox = document.getElementById('sugarBox');

selInput.addEventListener('input', () => {
  sugarBox.style.display = (selInput.value.length === 4) ? 'block' : 'none';
});

// ===== GO =====
function go(){

  const sel = document.getElementById('seleccion').value;
  const email = document.getElementById('userEmail').value;

  let base;

  if(sel.length === 4){
    base = (cafeMachine === 1) ? cafeBase : cafeBase2;
  } else {
    base = snackBase;
  }

  const url = new URL(base);

  const datos = decode(url.searchParams.get("datos"));
  const merchant = decode(url.searchParams.get("Ds_MerchantParameters"));

  datos.seleccion = sel;
  datos.productName = "SELECCION " + sel;
  datos.userEmail = email;

  url.searchParams.set("datos", encode(datos));
  url.searchParams.set("Ds_MerchantParameters", encode(merchant));

  window.location.href = url.toString();
}

</script>

</body>
</html>
