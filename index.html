<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
   :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --muted:#aab0be;
      --green:#1db954;
      --input:#222634;
      --border:#2a2f3a;
    }

    body{
      font-family: Arial, sans-serif;
      padding:16px;
      background:var(--bg);
      color:var(--text);
      margin:0;
    }

    .container{ max-width:420px; margin:0 auto; }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      font-size:16px;
      background:var(--input);
      color:var(--text);
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
      background:var(--green);
      color:white;
      margin-bottom:6px;
    }

    .selected{
      outline:2px solid white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="btnCafe1" onclick="setMachine(1)">☕ Café 1</button>
    <button id="btnCafe2" onclick="setMachine(2)">☕ Café 2</button>
  </div>

  <div class="box">
    <input id="orderId" type="text" placeholder="ID Order" />
  </div>

  <div class="box">
    <input id="seleccion" type="text" placeholder="Ej: 777 o 1003" />
  </div>

  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <button onclick="go()">PEDIR</button>

</div>

<script>

let machine = 1;

function setMachine(n){
  machine = n;

  document.getElementById("btnCafe1").classList.remove("selected");
  document.getElementById("btnCafe2").classList.remove("selected");

  document.getElementById("btnCafe"+n).classList.add("selected");
}

async function go(){

  const orderId = document.getElementById("orderId").value;
  const sel = document.getElementById("seleccion").value;
  const email = document.getElementById("userEmail").value;

  if (!orderId) {
    alert("Falta Order ID");
    return;
  }

  try {

    const res = await fetch("https://vending-backend-sjq8.onrender.com/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        orderId,
        amount: sel.length === 4 ? 50 : 100,
        seleccion: sel,
        email
      })
    });

    if (!res.ok) {
      throw new Error("Error backend: " + res.status);
    }

    const data = await res.json();

    console.log("BACKEND RESPONSE:", data);

    const url = new URL("https://fersomaticweb.onrender.com/pago-ok-seleccion");

    url.searchParams.set("Ds_MerchantParameters", data.Ds_MerchantParameters);
    url.searchParams.set("Ds_Signature", data.Ds_Signature);

    window.location.href = url.toString();

  } catch (err) {
    console.error(err);
    alert("Error conectando con backend");
  }
}

document.getElementById("btnCafe1").classList.add("selected");

</script>

</body>
</html>
