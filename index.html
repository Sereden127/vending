<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vending</title>

  <style>
    body{
      font-family: Arial;
      background:#0f1115;
      color:#e8eaf0;
      margin:0;
      padding:16px;
    }

    .box{
      background:#171a21;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
    }

    input, select{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:1px solid #2a2f3a;
      background:#222634;
      color:white;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:#1db954;
      color:white;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
    }

    .title{
      font-size:20px;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">🟢 Selección de vending</div>

  <!-- MAQUINA -->
  <label>Máquina</label>
  <select id="maquina">
    <option value="M1">Máquina M1</option>
    <option value="M2">Máquina M2</option>
    <option value="M3">Máquina M3</option>
  </select>

  <!-- PRODUCTO -->
  <label>Producto</label>
  <input id="producto" type="text" placeholder="Ej: Snack A / Café / Agua"/>

  <!-- IMPORTE -->
  <label>Importe (pruebas: 0 o 0.01)</label>
  <input id="importe" type="number" value="0" step="0.01"/>

  <!-- EMAIL OPCIONAL -->
  <label>Email (opcional)</label>
  <input id="email" type="text" placeholder="correo@ejemplo.com"/>

  <br><br>

  <button onclick="crearPedido()">CREAR PEDIDO</button>
</div>

<script>

const BACKEND = "https://vending-backend-sjq8.onrender.com";

async function crearPedido(){

  const maquina = document.getElementById("maquina").value;
  const producto = document.getElementById("producto").value;
  const importe = document.getElementById("importe").value;
  const email = document.getElementById("email").value;

  if (!producto) {
    alert("Introduce un producto");
    return;
  }

  try {

    const res = await fetch(`${BACKEND}/create-order`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        maquina,
        producto,
        importe: Number(importe),
        email
      })
    });

    if (!res.ok) {
      throw new Error("Error backend");
    }

    const data = await res.json();

    console.log("PEDIDO CREADO:", data);

    alert("Pedido creado: " + data.orderId);

    // 🔥 AQUÍ EN UN SISTEMA REAL:
    // Fersomatic devolvería URL de pago del TPV
    // y aquí redirigirías al pago

    // window.location.href = data.paymentUrl;

  } catch (err) {
    console.error(err);
    alert("Error conectando con backend");
  }
}

</script>

</body>
</html>
