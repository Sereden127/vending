<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selector Vending</title>

  <style>
    body{
      font-family: Arial;
      background:#0f1115;
      color:#e8eaf0;
      margin:0;
      padding:16px;
    }

    .box{
      background:#171a21;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
    }

    select, input{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:1px solid #2a2f3a;
      background:#222634;
      color:white;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:#1db954;
      color:white;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
    }

    .title{
      font-size:18px;
      margin-bottom:10px;
    }

    .hint{
      font-size:12px;
      opacity:0.7;
      margin-top:6px;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">🟢 Selector de producto</div>

  <label>Máquina</label>
  <select id="machineId">
    <option value="18983">V8 OZTURK QUEBABA</option>
  </select>

  <label>Producto</label>
  <input id="product" type="text" placeholder="Ej: Snack 138 / Café / Agua"/>

  <label>Importe (€)</label>
  <input id="price" type="number" value="0" step="0.01"/>

  <label>Email</label>
  <input id="email" type="text" placeholder="usuario@email.com"/>

  <div class="hint">
    ⚠ El pago real lo gestiona Fersomatic + TPV (Redsys). Aquí solo seleccionas.
  </div>

  <br><br>

  <button onclick="sendToTaos()">CONTINUAR A PAGO</button>
</div>

<script>

function sendToTaos(){

  const machineId = document.getElementById("machineId").value;
  const product = document.getElementById("product").value;
  const price = document.getElementById("price").value;
  const email = document.getElementById("email").value;

  if (!product) {
    alert("Introduce un producto");
    return;
  }

  // 🔥 ESTO ES LO IMPORTANTE:
  // Construimos URL compatible con TAOS / Fersomatic
  const params = new URLSearchParams({
    machineId,
    product,
    price,
    userEmail: email,
    zona: "snackseleccion",
    clientId: "Pica24h"
  });

  const taosUrl =
    "https://fersomaticweb.onrender.com/zonas/TAOS.html?" + params.toString();

  console.log("REDIRIGIENDO A TAOS:", taosUrl);

  // 🔥 AQUÍ ENTRAS EN EL SISTEMA REAL DE FERSOMATIC
  window.location.href = taosUrl;
}

</script>

</body>
</html>
