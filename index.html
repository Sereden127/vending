<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --text:#e8eaf0;
      --muted:#aab0be;
      --green:#1db954;
      --input:#222634;
      --border:#2a2f3a;
    }

    body{
      font-family: Arial, sans-serif;
      padding:16px;
      background:var(--bg);
      color:var(--text);
      margin:0;
    }

    .container{
      max-width:420px;
      margin:0 auto;
    }

    .box{
      background:var(--card);
      padding:14px;
      margin-bottom:12px;
      border-radius:14px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      font-size:16px;
      background:var(--input);
      color:var(--text);
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
      background:var(--green);
      color:white;
      margin-bottom:6px;
    }

    .selected{
      outline:2px solid white;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📱 Vending Ozturk</h2>

  <div class="box">
    <button id="btnCafe1" onclick="setMachine(1)">☕ Café 1</button>
    <button id="btnCafe2" onclick="setMachine(2)">☕ Café 2</button>
  </div>

  <!-- ORDER EDITABLE -->
  <div class="box">
    <input id="orderId" type="text" placeholder="ID Order" />
  </div>

  <div class="box">
    <input id="seleccion" type="text" inputmode="numeric" placeholder="Ej: 777 o 1003" />
  </div>

  <div class="box">
    <input id="userEmail" placeholder="Email" />
  </div>

  <div class="box" id="sugarBox" style="display:none;">
    <input id="sugarLevel" type="number" min="0" max="3" placeholder="Azúcar (0-3)" />
  </div>

  <button onclick="go()">PEDIR</button>

</div>

// ================= STATE =================
let machine = 1;

// ================= ORDER =================
function updateOrder(){

  const input = document.getElementById("orderId");

  // no sobrescribir si el usuario ya lo cambió
  if (input.value.trim() !== "") return;

  const base = machine === 1 ? cafeBase : snackBase;
  const url = new URL(base);

  const merchant = JSON.parse(
    atob(url.searchParams.get("Ds_MerchantParameters"))
  );

  input.value = merchant.Ds_Order || "";
}

// ================= UI =================
function setMachine(n){
  machine = n;

  document.getElementById("btnCafe1").classList.remove("selected");
  document.getElementById("btnCafe2").classList.remove("selected");

  document.getElementById("btnCafe"+n).classList.add("selected");

  updateOrder();
}

// azúcar solo para 4 dígitos
document.getElementById("seleccion").addEventListener("input", (e) => {
  document.getElementById("sugarBox").style.display =
    e.target.value.length === 4 ? "block" : "none";
});

// ================= MAIN =================
function go(){

  const sel = document.getElementById("seleccion").value;
  const email = document.getElementById("userEmail").value;

  const base = sel.length === 4 ? cafeBase : snackBase;

  const url = new URL(base);

  const datos = JSON.parse(atob(url.searchParams.get("datos")));
  const merchant = JSON.parse(atob(url.searchParams.get("Ds_MerchantParameters")));

  datos.seleccion = sel;
  datos.productName = "SELECCION " + sel;
  datos.userEmail = email;

  url.searchParams.set("datos", btoa(JSON.stringify(datos)));
  url.searchParams.set("Ds_MerchantParameters", btoa(JSON.stringify(merchant)));

  window.location.href = url.toString();
}

// ================= INIT =================
updateOrder();
document.getElementById("btnCafe1").classList.add("selected");

</script>

</body>
</html>
