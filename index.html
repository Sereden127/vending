<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Vending Debug Lab</title>
<style>
body{
  font-family:Arial;
  background:#0f1115;
  color:#e8eaf0;
  padding:16px;
}
textarea,input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #2a2f3a;
  background:#222634;
  color:white;
}
button{
  background:#1db954;
  font-weight:bold;
  cursor:pointer;
}
.box{
  max-width:700px;
  margin:auto;
}
</style>
</head>

<body>

<div class="box">

<h2>🧪 Vending Debug Lab</h2>

<p>Pega aquí tu enlace completo:</p>

<textarea id="url" rows="6"></textarea>

<p>Parámetro de test (opcional):</p>
<input id="param" placeholder="ej: test=1 o debug=abc" />

<button onclick="runTest()">PROBAR ENLACE</button>

<h3>Resultado:</h3>
<pre id="out"></pre>

</div>

<script>

function runTest(){

  const base = document.getElementById("url").value.trim();
  const extra = document.getElementById("param").value.trim();

  let url = new URL(base);

  if(extra){
    const [k,v] = extra.split("=");
    url.searchParams.set(k, v || "1");
  }

  const finalUrl = url.toString();

  document.getElementById("out").innerText =
    "URL FINAL:\n" + finalUrl + "\n\n" +
    "➡ Abriendo enlace...\n";

  // abrir en nueva pestaña
  window.open(finalUrl, "_blank");

}

</script>

</body>
</html>
