<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Ozturk</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #eef0f4;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .box {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-primary {
      background: #2d6cdf;
      color: white;
    }

    .btn-secondary {
      background: #444;
      color: white;
    }

    .readonly {
      font-weight: bold;
      margin-top: 6px;
    }

    textarea {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      padding: 10px;
    }

    .badge {
      display:inline-block;
      margin-top:8px;
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
      background:#ddd;
    }

    .snack { background:#ffd166; }
    .cafe { background:#8ecae6; }
  </style>
</head>
<body>

<h2>📱 Vending Ozturk</h2>

<div id="form"></div>

<button class="btn-primary" onclick="generate()">Generar enlace</button>
<button class="btn-secondary" onclick="copyLink()">🚀 Ir al enlace</button>

<textarea id="output" readonly></textarea>

<script>

const baseUrl = "https://fersomaticweb.onrender.com/pago-ok-seleccion";

let datos = {};
let merchant = {};
let signature = "";

function b64decode(str){
  try { return JSON.parse(atob(str)); } catch(e){ return {}; }
}

function b64encode(obj){
  return btoa(JSON.stringify(obj));
}

function decode(){
  const u = new URL(window.location.href);

  datos = b64decode(u.searchParams.get("datos"));
  merchant = b64decode(u.searchParams.get("Ds_MerchantParameters"));
  signature = u.searchParams.get("Ds_Signature");

  render();
}

function render(){
  document.getElementById('form').innerHTML = `
    <div class='box'>
      <h3>🛒 Máquina / Selección</h3>
      <input id='seleccion' type='text' inputmode='numeric' pattern='[0-9]*' placeholder='Ej: 777 o 1017' value='${datos.seleccion || ""}' />
      <div class='readonly'>Se detecta automáticamente tipo de zona</div>
      <div id='zonaBadge'></div>
    </div>

    <div class='box'>
      <h3>👤 Usuario</h3>
      <input id='clientId' placeholder='ID usuario' value='${datos.clientId || ""}' />
      <input id='userEmail' placeholder='Email' value='${datos.userEmail || ""}' />
    </div>

    <div class='box'>
      <h3>📦 Pedido</h3>
      <div class='readonly' id='pedidoView'>Se generará automáticamente</div>
    </div>
  `;
}

function detectZona(seleccion){
  if(!seleccion) return "";
  if(seleccion.toString() === "1017") return "CAFÉ";
  if(seleccion.toString().length === 3) return "SNACK";
  if(seleccion.toString().length === 4) return "CAFÉ";
  return "SNACK";
}

function detectProductName(seleccion, zona){
  if(seleccion.toString() === "1017") return "TE AL LIMON";
  if(zona === "CAFÉ") return "CAFÉ CON LECHE CAP";
  return zona + " " + seleccion;
}

function random4(){
  return Math.floor(1000 + Math.random() * 9000).toString();
}

function getCurrentDateTime(){
  const now = new Date();
  return {
    date: now.toLocaleDateString('es-ES'),
    hour: now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})
  };
}

function generate(){

  const seleccion = document.getElementById('seleccion').value;
  const clientId = document.getElementById('clientId').value;
  const userEmail = document.getElementById('userEmail').value;

  datos.seleccion = seleccion;
  datos.clientId = clientId;
  datos.userEmail = userEmail;

  const zona = detectZona(seleccion);
  datos.zona = zona;

  // 🍹 PRODUCT NAME LOGIC
  datos.productName = detectProductName(seleccion, zona);

  const badge = document.getElementById('zonaBadge');
  if(zona === "SNACK") badge.innerHTML = "<div class='badge snack'>SNACK</div>";
  if(zona === "CAFÉ") badge.innerHTML = "<div class='badge cafe'>CAFÉ</div>";

  let baseOrder = merchant.Ds_Order || "FER0000000000";

  const clean = baseOrder.toString().slice(0, -4);
  const newOrder = clean + random4();
  merchant.Ds_Order = newOrder;

  document.getElementById('pedidoView').innerText = newOrder;

  const dt = getCurrentDateTime();
  merchant.Ds_Date = dt.date;
  merchant.Ds_Hour = dt.hour;

  const url = baseUrl
    + "?datos=" + b64encode(datos)
    + "&Ds_MerchantParameters=" + b64encode(merchant)
    + "&Ds_Signature=" + signature
    + "&Ds_SignatureVersion=HMAC_SHA256_V1";

  document.getElementById('output').value = url;
}

function goToLink(){
  const url = document.getElementById('output').value;
  if(!url) return alert('Primero genera el enlace');
  window.location.href = url;
}

window.onload = decode;

</script>

</body>
</html>
